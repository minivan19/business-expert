# OpenClaw Skill Configuration for Business Expert

name: business-expert
displayName: 商务专家
description: >
  360°客户档案与经营分析。基于客户档案数据生成经营分析报告，采用混合模式（脚本处理结构化数据+LLM智能分析）。
  
  **当以下情况时使用此Skill**：
  (1) 需要生成客户经营分析报告
  (2) 需要分析客户订阅、实施、运维数据
  (3) 需要评估客户价值和经营健康度
  (4) 用户提到"客户分析"、"经营报告"、"商务分析"
version: 1.0.0
category: business
author: 李明衡
license: MIT

# 依赖
dependencies:
  python:
    - pandas>=2.0.0
    - openpyxl>=3.0.0
    - requests>=2.28.0

# 配置
config:
  defaults:
    client_data_path: "C:\\Users\\mingh\\client-data\\raw\\客户档案"
    output_dir: "C:\\Users\\mingh\\client-data\\_temp"
    api_key_env: "DEEPSEEK_API_KEY"
    model: "deepseek-chat"
    api_url: "https://api.deepseek.com/v1/chat/completions"
  
  # 6层数据框架配置
  data_framework:
    part1_enabled: true  # 客户基础档案
    part2_enabled: true  # 订阅续约与续费
    part3_enabled: true  # 实施优化情况
    part4_enabled: true  # 运维情况
    part5_enabled: false # 客户经营信息（待开发）
    part6_enabled: true  # 综合经营分析

# LLM配置
llm:
  temperature: 0.2
  max_tokens: 2000
  timeout: 120

# 工具定义
tools:
  - name: generate_business_report
    description: 生成客户经营分析报告
    parameters:
      - name: client_id
        description: 客户编号或'all'
        required: true
        type: string
      - name: output_dir
        description: 输出目录（可选）
        required: false
        type: string
      - name: verbose
        description: 详细输出模式
        required: false
        type: boolean

# 脚本入口
scripts:
  main: scripts/report_generator.py
  cli: scripts/cli.py

# 关键词
keywords:
  - 商务分析
  - 客户经营
  - 经营报告
  - 客户成功
  - 数据分析
  - LLM分析
  - 混合模式

# 创建时间
created: 2026-03-16
last_updated: 2026-03-17